name: Publish Docker Image

on:
  push:
    tags:
      - "v*"           # triggers on every release tag, e.g. v1.2.3
  workflow_dispatch:
    inputs:
      version:
        description: "Version without 'v' (e.g. 1.2.3). Used for the Docker tag."
        required: false
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Derive the version that will be used as the Docker tag ──────────────
      - name: Extract version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip the leading "v" from the git tag (v1.2.3 → 1.2.3)
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Authenticate with Docker Hub ────────────────────────────────────────
      # Requires two repository secrets:
      #   DOCKERHUB_USERNAME  →  marcosstefani
      #   DOCKERHUB_TOKEN     →  Docker Hub personal access token
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Enable multi-platform builds (amd64 + arm64) ────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Build and push ───────────────────────────────────────────────────────
      # Publishes two tags:
      #   marcosstefani/sucuri:1.2.3   ← pinned version
      #   marcosstefani/sucuri:latest  ← always points to the newest release
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            marcosstefani/sucuri:${{ steps.meta.outputs.version }}
            marcosstefani/sucuri:latest
